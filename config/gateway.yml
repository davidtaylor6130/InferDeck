server:
  host: "0.0.0.0"
  port: 11434

logging:
  level: "info"
  file: "logs/gateway.log"

auth:
  required: false
  token: ""

cors:
  origins:
    - "*"

state:
  file: "~/.inferdeck/state.json"

default_model: "qwen3.6-27b"

observability:
  stats_db: "~/.inferdeck/stats.db"
  adlx_helper: ""
  telemetry_poll_ms: 100

gateway:
  auto_swap: true
  n_batch: 512
  n_ubatch: 512
  use_mmap: false
  use_mlock: false
  n_gpu_layers: null
  flash_attn: "auto"
  kv_offload: true
  op_offload: true
  cache_type_k: "q4_0"
  cache_type_v: "q8_0"
  swa_full: false
  truncate_prompt: true

  # Server-side sampler defaults (issue #42). These mirror stock llama-server:
  # DRY off and repeat_penalty neutral, so reasoning models (Qwen3 / Qwen3.6)
  # stay coherent. Explicit per-request (OpenAI body) values still override
  # these. Can be overridden per entry under model_registry below.
  sampling:
    temperature: 0.8
    top_p: 0.95
    top_k: 40
    min_p: 0.05
    repeat_penalty: 1.0      # 1.0 = disabled (llama-server default)
    repeat_last_n: 64
    dry_multiplier: 0.0      # 0.0 = disabled (llama-server default)
    dry_base: 1.75
    dry_allowed_length: 2
    dry_penalty_last_n: -1   # -1 = context size
    dry_seq_breakers: ["\n", ":", "\"", "*"]

# Map Anthropic model names to local models so Anthropic-API clients
# (e.g. Claude Code) route to the right local model. Unmapped names fall back
# to the loaded model, then default_model. Keys must be the exact model IDs the
# client sends. Tier intent: Opus = smartest, Sonnet = mid, Haiku = fast;
# Fable is Anthropic's most capable model -> map to the largest local model.
anthropic:
  model_aliases:
    claude-opus-4-8: "qwen3.6-27b"
    claude-opus-4-7: "qwen3.6-27b"
    claude-opus-4-6: "qwen3.6-27b"
    claude-fable-5: "qwen3-coder-next"
    claude-sonnet-4-6: "qwen3.6-35b-a3b"
    claude-sonnet-4-5: "qwen3.6-35b-a3b"
    claude-haiku-4-5: "gpt-oss-20b"
    claude-haiku-4-5-20251001: "gpt-oss-20b"

model_registry:
  - name: "qwen3.6-27b"
    family: "qwen3.6"
    gguf_path: "C:/Inferdeck/models/unsloth/Qwen3.6-27B-GGUF/Qwen3.6-27B-Q4_K_M.gguf"
    mmproj_path: "C:/Inferdeck/models/unsloth/Qwen3.6-27B-GGUF/mmproj-BF16.gguf"
    n_slots: 3
    vram_required_mb: 31000
    context_size: 40960
    has_vision: true
    # Per-model sampler overrides inherit the global `gateway.sampling` block
    # above and override only the keys listed here (issue #42).
    # Qwen3 thinking/reasoning sweet spot (Qwen team): temp 0.6, top_p 0.95,
    # top_k 20, min_p 0, no repetition penalty / no DRY.
    sampling:
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      min_p: 0.0
      repeat_penalty: 1.0

  - name: "qwen3.6-35b-a3b"
    family: "qwen3.6"
    gguf_path: "C:/Inferdeck/models/lmstudio-community/Qwen3.6-35B-A3B-GGUF/Qwen3.6-35B-A3B-Q4_K_M.gguf"
    mmproj_path: ""
    n_slots: 2
    vram_required_mb: 24000
    context_size: 100096
    has_vision: false
    # Qwen3 thinking/reasoning sweet spot (Qwen team).
    sampling:
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      min_p: 0.0
      repeat_penalty: 1.0

  - name: "qwen3-coder-30b-a3b"
    family: "qwen3.6"
    gguf_path: "C:/Inferdeck/models/DevQuasar/Qwen.Qwen3-Coder-30B-A3B-Instruct-GGUF/Qwen.Qwen3-Coder-30B-A3B-Instruct.Q4_K_M.gguf"
    mmproj_path: ""
    n_slots: 1
    vram_required_mb: 20000
    context_size: 262144
    has_vision: false
    # Qwen3-Coder recommended sampling (Qwen team): temp 0.7, top_p 0.8,
    # top_k 20, repetition_penalty 1.05.
    sampling:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      min_p: 0.0
      repeat_penalty: 1.05

  - name: "qwen3-coder-next"
    family: "qwen3-next"
    gguf_path: "C:/Inferdeck/models/unsloth/Qwen3-Coder-Next-GGUF/Qwen3-Coder-Next-UD-Q2_K_XL.gguf"
    mmproj_path: null
    n_slots: 1
    vram_required_mb: 29000
    context_size: 262144
    has_vision: false
    # Qwen3-Coder recommended sampling (Qwen team).
    sampling:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      min_p: 0.0
      repeat_penalty: 1.05

  - name: "qwen2.5-coder-3b"
    family: "qwen2.5"
    gguf_path: "C:/Inferdeck/models/Qwen/Qwen2.5-Coder-3B-Instruct-GGUF/qwen2.5-coder-3b-instruct-q4_k_m.gguf"
    mmproj_path: null
    n_slots: 16
    vram_required_mb: 2500
    context_size: 32768
    has_vision: false
    # Qwen2.5 recommended generation config: temp 0.7, top_p 0.8, top_k 20,
    # repetition_penalty 1.05.
    sampling:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      min_p: 0.0
      repeat_penalty: 1.05

  - name: "gemma-4-26b-a4b"
    family: "gemma4"
    gguf_path: "C:/Inferdeck/models/unsloth/gemma-4-26B-A4B-it-GGUF/gemma-4-26B-A4B-it-UD-IQ3_XXS.gguf"
    mmproj_path: "C:/Inferdeck/models/unsloth/gemma-4-26B-A4B-it-GGUF/mmproj-F32.gguf"
    n_slots: 4
    vram_required_mb: 13000
    context_size: 32768
    has_vision: true
    # Gemma recommended sampling (Google): temp 1.0, top_k 64, top_p 0.95,
    # min_p 0.
    sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 64
      min_p: 0.0
      repeat_penalty: 1.0

  - name: "gpt-oss-20b"
    family: "gpt-oss"
    gguf_path: "C:/Inferdeck/models/lmstudio-community/gpt-oss-20b-GGUF/gpt-oss-20b-MXFP4.gguf"
    mmproj_path: null
    n_slots: 8
    vram_required_mb: 13000
    context_size: 32768
    has_vision: false
    # gpt-oss recommended sampling (OpenAI): temp 1.0, top_p 1.0, top_k disabled,
    # min_p 0. Repetition controls off.
    sampling:
      temperature: 1.0
      top_p: 1.0
      top_k: 0
      min_p: 0.0
      repeat_penalty: 1.0
