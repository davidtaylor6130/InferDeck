# InferDeck Gateway Configuration
# Usage: ./inferdeck-gateway.exe -c config/gateway.yml

server:
  host: "0.0.0.0"
  port: 8080
  tls:
    enabled: true
    cert_file: "certs/server.crt"
    key_file: "certs/server.key"

model:
  path: "models/llama-2-7b.Q4_K_M.gguf"
  precision: "auto"
  ctx_len: 4096
  n_gpu_layers: -1

gpu:
  device_id: 0
  mem_alloc_percent: 95

queue:
  worker_threads: 4
  max_queue_size: 10
  timeout_seconds: 60

logging:
  level: "info"
  file: "logs/inferdeck.log"
  console: true

api:
  rate_limit: 100
  cors_origins: "*"

# ===========================================================================
# Backend Configuration
# ===========================================================================

backends:
  # STT - Speech-to-Text (Whisper GGML)
  stt:
    enabled: true
    name: "whisper"
    model_path: "models/whisper-large-v3.bin"
    device_id: 0
    language: "auto"
    translate: false

  # TTS - Text-to-Speech (Piper)
  tts:
    enabled: true
    name: "piper"
    voice_model_path: "models/piper-voices/en/en_US-amy-medium.onnx"
    voice_name: "amy"
    sample_rate: 22050
    output_format: "wav"
    default_voice: "amy"

  # Image Generation (stable-diffusion.cpp)
  image:
    enabled: true
    name: "stable_diffusion"
    checkpoint_path: "models/sd-turbo.gguf"
    quantization: "f16"
    device_id: 0
    default_size: 1024
    default_steps: 30
    default_cfg_scale: 7.5

  # Embedding (GTE)
  embedding:
    enabled: true
    name: "gte"
    model_path: "models/gte-small.gguf"
    dimensions: 384
    device_id: 0

  # Training (Llama.cpp finetune)
  training:
    enabled: true
    name: "llama_finetune"
    model_path: "models/llama-2-7b.Q4_K_M.gguf"
    device_id: 0
    default_epochs: 3
    default_learning_rate: 0.0001
    default_batch_size: 1
    max_steps: 1000
    checkpoint_dir: "models/checkpoints"

# ===========================================================================
# Vector Store Configuration
# ===========================================================================

vector_store:
  backend: "sqlite"
  db_path: "data/vector_store.db"
  max_embeddings: 100000
  lru_cache_size: 1000
  similarity_threshold: 0.5
  fts5_enabled: true

# ===========================================================================
# VRAM Arbitration
# ===========================================================================

vram:
  total_bytes: 0
  mem_alloc_percent: 95
  exclusive_lock_threshold: 0.8
  priority_order:
    - system_health
    - text_generation
    - speech_to_text
    - text_to_speech
    - embedding
    - document_query
    - document_index
    - fine_tuning
    - image_generation
