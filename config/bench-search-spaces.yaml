params:
  temperature:
    type: float
    range: "0.0..1.5"
  top_p:
    type: float
    range: "0.5..1.0"
  min_p:
    type: float
    range: "0.0..0.2"
  top_k:
    type: int
    range: "1..100"
  repeat_penalty:
    type: float
    range: "1.0..1.3"
  sampler:
    type: categorical
    choices: ["top_p", "top_k", "min_p", "greedy"]
